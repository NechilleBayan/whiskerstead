<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiskerstead</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #cfe0cf;
        font-family: "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
        cursor: default;
      }
      #stage { display: block; width: 100vw; height: 100vh; }
      #debug {
        position: fixed;
        top: 8px;
        left: 8px;
        max-width: 42ch;
        padding: 8px 10px;
        font: 11px/1.4 ui-monospace, "Cascadia Code", monospace;
        color: #3a2f28;
        background: rgba(255, 252, 245, 0.82);
        border: 2px solid #8a7d6b;
        border-radius: 10px;
        white-space: pre-wrap;
        pointer-events: none;
        display: none;
      }
      #hint {
        position: fixed;
        bottom: 10px;
        right: 12px;
        font-size: 12px;
        color: #6a5d4d;
        background: rgba(255, 252, 245, 0.7);
        padding: 4px 8px;
        border-radius: 8px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <pre id="debug"></pre>
    <div id="hint">drag a cat &middot; <b>D</b> debug &middot; <b>F</b> fast &middot; <b>1/2/3</b> weather</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
